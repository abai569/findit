name: wuping_guanjia
description: 物品定位记录应用 - 记录物品位置，快速查找
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 数据库
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # WebDAV
  webdav_client: ^1.2.2
  
  # 图片处理
  image_picker: ^1.0.4
  flutter_image_compress: ^2.1.0
  path_provider: ^2.1.1
  
  # 加密
  encrypt: ^5.0.3
  crypto: ^3.0.3
  
  # 状态管理
  provider: ^6.1.1
  
  # 工具
  shared_preferences: ^2.2.2
  uuid: ^4.2.1
  intl: ^0.18.1
  
  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
