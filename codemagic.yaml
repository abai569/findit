workflows:
  wuping-guanjia-apk:
    name: 物品管家 APK Builder
    max_build_duration: 60
    environment:
      flutter: stable
      android_signing:
        - keystore_reference
    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter pub get
      
      - name: Build APK
        script: |
          flutter build apk --release
    
    artifacts:
      - build/**/outputs/**/*.apk
    
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
