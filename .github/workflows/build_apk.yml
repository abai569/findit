name: Build Flutter APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: |
          flutter pub get
          flutter precache
          cd android
          chmod +x gradlew
      
      - name: Build APK
        run: |
          flutter build apk --release --verbose 2>&1 | tee build.log
          if [ $? -ne 0 ]; then
            echo "Build failed. Showing last 100 lines of log:"
            tail -n 100 build.log
            exit 1
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 物品管家
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
